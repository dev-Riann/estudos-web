<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>

        /* SELETORES PERSONALIZADOS
        
            # = id
            . = class
            : = pseudo-classe
            :: = pseudo-elemento
            > = filho direto (children)            

        */
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        a {
            color: purple;
            text-decoration: none;
        }

        a:visited {
            color: red;
        }

        a:hover {
            color: purple;
            text-decoration: underline;
        }

        a:active {
            color: blue;
        }

        a::after {
            content: ' {link}';
            text-decoration: none;
            font-weight: normal;
            color: purple;
        }

        .especial::before {
            content: '<<';
            color: green;
        }

        .especial::after {
            content: '>>';
            color: green;
        }
    </style>
</head>
<body>
    <h1>Personalizando Links</h1>
    <ul>
        <li><a href="https://github.com/dev-Riann" target="_blank">Repositório GitHub</a></li>
        <li><a href="https://youtube.com/cursoemvideo" class="especial">Canal do YouTube</a></li>
        <li><a href="https://cursoemvideo.com">Site do Curso em Vídeo</a></li>
    </ul>
</body>
</html>
