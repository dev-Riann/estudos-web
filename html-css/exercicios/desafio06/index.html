<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="short icon" href="Bokehlicia-Captiva-Rocket.ico">
    <title>Desafio 06</title>
</head>
<body>
    <h1>Tags em HTML</h1>
    <p>Em HTML5, podemos inserir os elementos da lista a seguir. Passe o mouse sobre os termos para descobrir qual TAG deverá utilizar em cada caso.</p>
    <ul>
        <li><abbr title="Use a TAG &lt;p&gt;">Parágrafos</abbr></li>
        <li><abbr title="Use a TAG &lt;h1&gt;... &lt;h6&gt;">Títulos</abbr></li>
        <li><abbr title="Use a TAG &lt;img&gt;">Imagens</abbr></li>
        <li><abbr title="Use a TAG &lt;abbr&gt;">Abreviações</abbr></li>
        <li><abbr title="Use a TAG &lt;code&gt;">Código-Fonte</abbr></li>
        <li><abbr title="Use a TAG &lt;ol&gt; e &lt;li&gt;">Listas númeradas</abbr></li>
        <li><abbr title="Use a TAG &lt;ul&gt; e &lt;li&gt;">Listas com demarcadores</abbr>
    </ul>
</body>
</html>
