<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes externas</title>
    <style>
        @font-face {
            font-family: 'Love';
            src: url('Fontes/love\ story\ ttf.ttf') format(truetype);
            font-weight: normal;
            font-style: normal;

        /*

        Tipos de formatação de fontes:
        - open type: otf
        - true type: ttf
        - embedded opentype
        - truetype-aat: Apple Advanced Typography 

        */
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        h1 {
            font-family: 'Love', Times, serif;
            font-size: 3em;
            font-weight: normal;
        }
    </style>
</head>
<body>
    <h1>Olá, Mundo!</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Expedita dignissimos officiis ducimus corporis placeat consequatur perspiciatis labore quo nobis non, totam veritatis repellat et saepe accusantium unde fuga sint obcaecati.</p>
</body>
</html>
